"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#a3aed2)\
[ оң‘ ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
${custom.git_remote}\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#212736 bg:#1d2230)\
$time\
[оӮҙ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false
truncation_symbol = ""

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:yellow"
# format = '[[ $symbol $branch( вҶ’$remote_name/$remote_branch) ](fg:crust bg:yellow)]($style)'
format = '[[ $symbol $branch](fg:crust bg:yellow)]($style)'

[custom.git_remote]
command = '''
cur=$(git branch --show-current 2>/dev/null)
remote=$(git rev-parse --abbrev-ref --symbolic-full-name @{u} 2>/dev/null)
[ -z "$remote" ] && exit 0
remote_name="${remote%%/*}"
remote_branch="${remote#*/}"
if [ "$cur" = "$remote_branch" ]; then
  echo "вҶ’$remote_name"
else
  echo "вҶ’$remote_name/$remote_branch"
fi
'''
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bg:yellow"
format = '[[$output](fg:crust bg:yellow)]($style)'
shell = ["sh"]

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'
